<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Applications - CampusAid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        .approval-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .applications-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .application-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }

        .application-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .applicant-info h3 {
            margin: 0 0 8px 0;
            color: #2c3e50;
        }

        .applicant-info p {
            margin: 4px 0;
            color: #7f8c8d;
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .application-details {
            margin: 16px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-row {
            display: flex;
            margin-bottom: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: #2c3e50;
            min-width: 100px;
        }

        .detail-value {
            color: #7f8c8d;
        }

        .application-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: #28a745;
            color: white;
        }

        .btn-approve:hover {
            background: #218838;
        }

        .btn-reject {
            background: #dc3545;
            color: white;
        }

        .btn-reject:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state h3 {
            margin-bottom: 8px;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            color: #2c3e50;
        }

        .modal-body textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* ========================================
           MOBILE RESPONSIVENESS
           ======================================== */
        
        /* Tablet (768px and below) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .approvals-container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .back-btn {
                width: 100%;
            }

            .applications-list {
                gap: 15px;
            }

            .application-card {
                padding: 18px 15px;
            }

            .application-actions {
                flex-direction: column;
                gap: 8px;
            }

            .application-actions button {
                width: 100%;
            }

            .modal-content {
                max-width: 95%;
                padding: 25px 20px;
            }
        }

        /* Mobile (480px and below) */
        @media (max-width: 480px) {
            .approvals-container {
                padding: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .application-card h3 {
                font-size: 16px;
            }

            .application-info {
                font-size: 13px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        /* ================================================
           PREMIUM THEME - Burgundy & Cream
           ================================================ */
        :root {
            --burgundy-primary: #4E0000;
            --burgundy-dark: #3A0000;
            --burgundy-light: #6B1E1E;
            --cream: #F5E6D3;
            --cream-dark: #E6C9A8;
            --chocolate: #6B4E3D;
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
        }

        .approval-container {
            background: white;
            box-shadow: 0 20px 60px rgba(78, 0, 0, 0.15);
            border: 1px solid rgba(78, 0, 0, 0.1);
        }

        .approval-container h1 {
            color: var(--burgundy-primary);
        }

        .approval-card {
            box-shadow: 0 8px 30px rgba(78, 0, 0, 0.08);
            border-left: 4px solid var(--burgundy-primary);
        }

        .approval-card h3 {
            color: var(--burgundy-primary);
        }

        .info-row strong {
            color: var(--chocolate);
        }

        .btn-approve {
            background: #28a745;
        }

        .btn-reject {
            background: var(--burgundy-primary);
        }

        .btn-reject:hover {
            background: var(--burgundy-dark);
        }

        .badge-pending {
            background: var(--cream-dark);
            color: var(--chocolate);
        }

        .badge-approved {
            background: #28a745;
        }

        .badge-rejected {
            background: var(--burgundy-primary);
        }

        .alert-success {
            background: #D4EDDA;
            border-color: #C3E6CB;
        }

        .alert-error {
            background: #F8D7DA;
            border-color: var(--burgundy-light);
        }

        .loading {
            color: var(--chocolate);
        }
    </style>
</head>
<body>
    <div class="approval-container">
        <h1>Staff Applications</h1>
        <p style="color: #7f8c8d; margin-bottom: 20px;">Review and approve pending staff applications</p>

        <div id="applicationsContainer" class="applications-grid"></div>
    </div>

    <!-- Approval Modal -->
    <div id="approvalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Approve Application</h3>
            </div>
            <div class="modal-body">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Notes (Optional)</label>
                <textarea id="approvalNotes" placeholder="Add any notes for the applicant..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-approve" onclick="confirmApproval()">Approve</button>
            </div>
        </div>
    </div>

    <!-- Rejection Modal -->
    <div id="rejectionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reject Application</h3>
            </div>
            <div class="modal-body">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Reason for Rejection (Optional)</label>
                <textarea id="rejectionNotes" placeholder="Explain why this application is being rejected..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-reject" onclick="confirmRejection()">Reject</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'window.location.origin/api';
        let currentApplicationId = null;

        // Load applications on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadApplications();
        });

        // Load pending applications
        async function loadApplications() {
            try {
                const response = await fetch(`${API_BASE}/auth/staff-applications`, {
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    renderApplications(data.data);
                } else {
                    alert(data.error || 'Failed to load applications');
                }

            } catch (error) {
                console.error('Load error:', error);
                alert('Failed to load applications');
            }
        }

        // Render applications
        function renderApplications(applications) {
            const container = document.getElementById('applicationsContainer');

            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Pending Applications</h3>
                        <p>All staff applications have been reviewed.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = applications.map(app => `
                <div class="application-card">
                    <div class="application-header">
                        <div class="applicant-info">
                            <h3>${app.full_name || 'Unknown'}</h3>
                            <p>📧 ${app.email}</p>
                            <p>🏢 ${app.service_name}</p>
                        </div>
                        <span class="status-badge status-pending">Pending</span>
                    </div>

                    <div class="application-details">
                        <div class="detail-row">
                            <span class="detail-label">Position:</span>
                            <span class="detail-value">${app.position || 'Not specified'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">ID:</span>
                            <span class="detail-value">${app.student_id || 'N/A'}</span>
                        </div>
                        ${app.reason ? `
                        <div class="detail-row" style="flex-direction: column; margin-top: 12px;">
                            <span class="detail-label">Application Reason:</span>
                            <span class="detail-value" style="margin-top: 4px;">${app.reason}</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="application-actions">
                        <button class="btn btn-approve" onclick="openApprovalModal(${app.id})">
                            ✓ Approve
                        </button>
                        <button class="btn btn-reject" onclick="openRejectionModal(${app.id})">
                            ✗ Reject
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Open approval modal
        function openApprovalModal(applicationId) {
            currentApplicationId = applicationId;
            document.getElementById('approvalNotes').value = '';
            document.getElementById('approvalModal').classList.add('show');
        }

        // Open rejection modal
        function openRejectionModal(applicationId) {
            currentApplicationId = applicationId;
            document.getElementById('rejectionNotes').value = '';
            document.getElementById('rejectionModal').classList.add('show');
        }

        // Close modal
        function closeModal() {
            document.getElementById('approvalModal').classList.remove('show');
            document.getElementById('rejectionModal').classList.remove('show');
            currentApplicationId = null;
        }

        // Confirm approval
        async function confirmApproval() {
            const notes = document.getElementById('approvalNotes').value.trim();

            try {
                const response = await fetch(`${API_BASE}/auth/staff-applications/${currentApplicationId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ notes: notes || null })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Application approved successfully!');
                    closeModal();
                    loadApplications(); // Reload
                } else {
                    alert(data.error || 'Failed to approve application');
                }

            } catch (error) {
                console.error('Approve error:', error);
                alert('Failed to approve application');
            }
        }

        // Confirm rejection
        async function confirmRejection() {
            const notes = document.getElementById('rejectionNotes').value.trim();

            try {
                const response = await fetch(`${API_BASE}/auth/staff-applications/${currentApplicationId}/reject`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ notes: notes || null })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Application rejected.');
                    closeModal();
                    loadApplications(); // Reload
                } else {
                    alert(data.error || 'Failed to reject application');
                }

            } catch (error) {
                console.error('Reject error:', error);
                alert('Failed to reject application');
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
