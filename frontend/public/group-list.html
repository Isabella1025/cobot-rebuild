<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobot - Group Chats</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/group-list.css">
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="logo">🤖 Cobot</h1>
                    <div class="course-info" id="courseInfo">
                        <span class="course-code"></span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info" id="userInfo">
                        <span class="user-name"></span>
                        <span class="user-role"></span>
                    </div>
                    <button class="btn-logout" id="logoutBtn">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Group Chats</h2>
                    <button class="btn-icon" id="createGroupBtn" title="Create Group">
                        ➕
                    </button>
                </div>

                <!-- Group List -->
                <div class="group-list" id="groupList">
                    <!-- Groups will be loaded here -->
                    <div class="loading">Loading groups...</div>
                </div>

                <!-- Additional Options -->
                <div class="sidebar-footer">
                    <button class="btn-secondary btn-full" id="toggleOptionsBtn">
                        Other Options ▼
                    </button>
                    <div class="options-menu" id="optionsMenu" style="display: none;">
                        <button class="option-btn" id="createBotBtn">
                            🤖 Create Bot
                        </button>
                        <button class="option-btn" id="uploadDocBtn">
                            📄 Upload Document
                        </button>
                        <button class="option-btn" id="vectorStoreBtn">
                            🗄️ Vector Stores
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">💬</div>
                <h2>Select a group to start chatting</h2>
                <p>Choose a group from the sidebar or create a new one</p>
            </div>
        </main>
    </div>

    <!-- Create Group Modal -->
    <div class="modal" id="createGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Group</h2>
                <button class="btn-close" id="closeCreateGroupModal">×</button>
            </div>
            <div class="modal-body">
                <form id="createGroupForm">
                    <div class="form-group">
                        <label for="groupName">Group Name</label>
                        <input 
                            type="text" 
                            id="groupName" 
                            name="groupName"
                            placeholder="e.g., Study Group 1"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Add Members (Optional)</label>
                        <div class="members-list" id="membersList">
                            <!-- Members will be loaded here -->
                            <div class="loading-small">Loading members...</div>
                        </div>
                    </div>

                    <div id="createGroupError" class="error-message" style="display: none;"></div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="cancelCreateGroup">Cancel</button>
                        <button type="submit" class="btn-primary" id="submitCreateGroup">
                            <span id="createGroupBtnText">Create Group</span>
                            <span id="createGroupBtnLoader" class="loader" style="display: none;"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/groupList.js"></script>
</body>
</html>
