<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - CampusAid</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --burgundy-primary: #4E0000;
            --burgundy-dark: #3A0000;
            --burgundy-light: #6B1E1E;
            --cream: #F5E6D3;
            --cream-dark: #E6C9A8;
            --navy: #13273F;
            --slate: #7A8B99;
            --chocolate: #6B4E3D;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            padding: 25px 35px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--burgundy-primary);
        }

        .header h1 {
            color: var(--burgundy-primary);
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-badge {
            background: linear-gradient(135deg, var(--burgundy-primary) 0%, var(--burgundy-light) 100%);
            color: var(--cream);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
        }

        .back-btn {
            background: var(--cream);
            color: var(--burgundy-primary);
            border: 2px solid var(--burgundy-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--cream-dark);
            transform: translateY(-2px);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(78, 0, 0, 0.08);
            border-left: 4px solid var(--burgundy-primary);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(78, 0, 0, 0.15);
        }

        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: var(--chocolate);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-card .value {
            color: var(--burgundy-primary);
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card .change {
            font-size: 13px;
            color: #27ae60;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-card .change.negative {
            color: #e74c3c;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.08);
            border: 1px solid rgba(78, 0, 0, 0.08);
        }

        .chart-card h2 {
            color: var(--burgundy-primary);
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Table */
        .table-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        .table-card h2 {
            color: var(--burgundy-primary);
            font-size: 20px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--cream);
        }

        th {
            padding: 15px;
            text-align: left;
            color: var(--burgundy-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--burgundy-primary);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--cream-dark);
            color: var(--chocolate);
        }

        tr:hover {
            background: var(--cream);
        }

        .badge {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: var(--cream-dark);
            color: var(--chocolate);
        }

        .badge-danger {
            background: #f8d7da;
            color: var(--burgundy-dark);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--chocolate);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--cream-dark);
            border-top-color: var(--burgundy-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header-actions {
                flex-direction: column;
                width: 100%;
            }

            .back-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="header-actions">
                <div class="user-badge" id="userBadge">Loading...</div>
                <a href="/services.html" class="back-btn">← Back to Services</a>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading statistics...</p>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="chart-card">
                <h2>📅 Appointments by Service</h2>
                <div class="chart-container">
                    <canvas id="appointmentsByServiceChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h2>📈 Appointments Over Time</h2>
                <div class="chart-container">
                    <canvas id="appointmentsOverTimeChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h2>💬 Messages by Channel</h2>
                <div class="chart-container">
                    <canvas id="messagesByChannelChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h2>✅ Appointment Status Distribution</h2>
                <div class="chart-container">
                    <canvas id="appointmentStatusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Activity Table -->
        <div class="table-card">
            <h2>🕒 Recent Activity</h2>
            <table id="recentActivityTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Activity</th>
                        <th>User</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="loading">
                            <div class="spinner"></div>
                            Loading activity...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        // Check authentication
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user) {
            window.location.href = '/';
        }

        // Display user
        document.getElementById('userBadge').textContent = user.full_name || user.email;

        // Chart.js default config
        Chart.defaults.color = '#6B4E3D';
        Chart.defaults.borderColor = 'rgba(78, 0, 0, 0.1)';

        let charts = {};

        // Load analytics data
        async function loadAnalytics() {
            try {
                const response = await fetch(`${API_BASE}/analytics`, {
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    displayStats(data.data.stats);
                    createCharts(data.data);
                    displayRecentActivity(data.data.recentActivity);
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <p style="color: #e74c3c;">Failed to load analytics data</p>
                    </div>
                `;
            }
        }

        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="icon">📅</div>
                    <div class="label">Total Appointments</div>
                    <div class="value">${stats.totalAppointments || 0}</div>
                    <div class="change">
                        ↑ ${stats.appointmentsThisWeek || 0} this week
                    </div>
                </div>

                <div class="stat-card">
                    <div class="icon">💬</div>
                    <div class="label">Total Messages</div>
                    <div class="value">${stats.totalMessages || 0}</div>
                    <div class="change">
                        ↑ ${stats.messagesThisWeek || 0} this week
                    </div>
                </div>

                <div class="stat-card">
                    <div class="icon">👥</div>
                    <div class="label">Active Users</div>
                    <div class="value">${stats.activeUsers || 0}</div>
                    <div class="change">
                        ↑ ${stats.newUsersThisWeek || 0} new this week
                    </div>
                </div>

                <div class="stat-card">
                    <div class="icon">🤖</div>
                    <div class="label">Bot Interactions</div>
                    <div class="value">${stats.botInteractions || 0}</div>
                    <div class="change">
                        ↑ ${stats.botInteractionsThisWeek || 0} this week
                    </div>
                </div>
            `;
        }

        function createCharts(data) {
            // Appointments by Service
            if (charts.appointmentsByService) charts.appointmentsByService.destroy();
            const ctx1 = document.getElementById('appointmentsByServiceChart');
            charts.appointmentsByService = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: data.appointmentsByService.map(s => s.service_name),
                    datasets: [{
                        label: 'Appointments',
                        data: data.appointmentsByService.map(s => s.count),
                        backgroundColor: 'rgba(78, 0, 0, 0.8)',
                        borderColor: '#4E0000',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // Appointments Over Time
            if (charts.appointmentsOverTime) charts.appointmentsOverTime.destroy();
            const ctx2 = document.getElementById('appointmentsOverTimeChart');
            charts.appointmentsOverTime = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: data.appointmentsOverTime.map(d => d.date),
                    datasets: [{
                        label: 'Appointments',
                        data: data.appointmentsOverTime.map(d => d.count),
                        borderColor: '#4E0000',
                        backgroundColor: 'rgba(78, 0, 0, 0.1)',
                        tension: 0.4,
                        fill: true,
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // Messages by Channel
            if (charts.messagesByChannel) charts.messagesByChannel.destroy();
            const ctx3 = document.getElementById('messagesByChannelChart');
            charts.messagesByChannel = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: data.messagesByChannel.map(c => c.channel_name),
                    datasets: [{
                        data: data.messagesByChannel.map(c => c.count),
                        backgroundColor: [
                            '#4E0000',
                            '#6B1E1E',
                            '#6B4E3D',
                            '#7A8B99',
                            '#E6C9A8'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // Appointment Status
            if (charts.appointmentStatus) charts.appointmentStatus.destroy();
            const ctx4 = document.getElementById('appointmentStatusChart');
            charts.appointmentStatus = new Chart(ctx4, {
                type: 'pie',
                data: {
                    labels: data.appointmentsByStatus.map(s => s.status),
                    datasets: [{
                        data: data.appointmentsByStatus.map(s => s.count),
                        backgroundColor: [
                            '#E6C9A8',
                            '#27ae60',
                            '#e74c3c',
                            '#3498db'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function displayRecentActivity(activity) {
            const tbody = document.querySelector('#recentActivityTable tbody');
            
            if (!activity || activity.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #7A8B99;">No recent activity</td></tr>';
                return;
            }

            tbody.innerHTML = activity.map(a => `
                <tr>
                    <td>${new Date(a.created_at).toLocaleString()}</td>
                    <td>${a.activity_type}</td>
                    <td>${a.user_name || a.user_email}</td>
                    <td>
                        <span class="badge badge-${a.status === 'approved' ? 'success' : a.status === 'pending' ? 'warning' : 'danger'}">
                            ${a.status || 'completed'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', loadAnalytics);
    </script>
</body>
</html>
