<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobot - Welcome</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/welcome.css">
</head>
<body>
    <div class="container">
        <div class="welcome-card">
            <div class="logo-section">
                <div class="logo">🤖</div>
                <h1>Cobot</h1>
                <p class="subtitle">AI-Powered Academic Collaboration Platform</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="courseCode">Course Code</label>
                    <input 
                        type="text" 
                        id="courseCode" 
                        name="courseCode"
                        placeholder="e.g., CS101"
                        required
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input 
                        type="text" 
                        id="studentId" 
                        name="studentId"
                        placeholder="e.g., STU001"
                        required
                        autocomplete="off"
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    <span id="loginBtnText">Enter Chat</span>
                    <span id="loginBtnLoader" class="loader" style="display: none;"></span>
                </button>
            </form>

            <div class="help-text">
                <p>Don't know your details? Contact your course instructor.</p>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2025 Cobot - Ashesi University Capstone Project</p>
            <p class="small-text">Developed by Isabella Tsikata</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
