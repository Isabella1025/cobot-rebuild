<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusAid - Ashesi Student Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="images/favicon.jpeg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Premium Color Palette */
            --burgundy: #4E0000;
            --burgundy-light: #6B1E1E;
            --burgundy-dark: #3A0000;
            --cream: #E6C9A8;
            --cream-light: #F5E6D3;
            --cream-dark: #D4B896;
            --navy: #13273F;
            --navy-light: #1E3A5F;
            --slate: #7A8B99;
            --chocolate: #6B4E3D;
            
            /* Functional Colors */
            --success: #27ae60;
            --error: #c0392b;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-image: url('images/background2.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Premium Background Pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(78, 0, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(19, 39, 63, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(78, 0, 0, 0.15),
                0 0 0 1px rgba(78, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            padding: 50px 45px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            overflow-y: auto;
        }

        /* Custom scrollbar for auth container */
        .auth-container::-webkit-scrollbar {
            width: 8px;
        }

        .auth-container::-webkit-scrollbar-track {
            background: var(--cream-light);
            border-radius: 4px;
        }

        .auth-container::-webkit-scrollbar-thumb {
            background: var(--burgundy);
            border-radius: 4px;
        }

        .auth-container::-webkit-scrollbar-thumb:hover {
            background: var(--burgundy-dark);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ashesi Branding */
        .logo {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--cream);
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(78, 0, 0, 0.1));
        }

        .logo h1 {
            color: var(--burgundy);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo p {
            color: var(--navy);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .logo-subtext {
            color: var(--slate);
            font-size: 13px;
            margin-top: 6px;
            font-weight: 400;
        }

        /* Tab System */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            background: var(--cream-light);
            padding: 6px;
            border-radius: 12px;
        }

        .tab {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--navy);
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tab:hover {
            background: rgba(78, 0, 0, 0.05);
        }

        .tab.active {
            background: var(--burgundy);
            color: white;
            box-shadow: 0 4px 12px rgba(78, 0, 0, 0.25);
        }

        /* Form Styling */
        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--navy);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.2px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--cream);
            border-radius: 10px;
            font-size: 15px;
            color: var(--navy);
            background: white;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--burgundy);
            box-shadow: 0 0 0 4px rgba(78, 0, 0, 0.08);
        }

        .form-control::placeholder {
            color: var(--slate);
            opacity: 0.7;
        }

        /* Checkbox Styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 14px;
            background: var(--cream-light);
            border-radius: 10px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .checkbox-group:has(input:checked) {
            border-color: var(--burgundy);
            background: rgba(78, 0, 0, 0.03);
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--burgundy);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--navy);
            cursor: pointer;
        }

        /* Service Dropdown */
        .service-select-group {
            display: none;
            margin-bottom: 20px;
            padding: 18px;
            background: var(--cream-light);
            border-radius: 12px;
            border-left: 4px solid var(--burgundy);
        }

        .service-select-group.visible {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 500px;
            }
        }

        /* Premium Button */
        .btn-premium {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 4px 16px rgba(78, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(78, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-premium:active {
            transform: translateY(0);
        }

        .btn-premium:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* OTP Input */
        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 55px;
            height: 62px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--cream);
            border-radius: 12px;
            color: var(--burgundy);
            background: white;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--burgundy);
            box-shadow: 0 0 0 4px rgba(78, 0, 0, 0.1);
            transform: scale(1.05);
        }

        /* Helper Text */
        .helper-text {
            text-align: center;
            color: var(--slate);
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.6;
        }

        .helper-text a {
            color: var(--burgundy);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .helper-text a:hover {
            color: var(--burgundy-light);
            text-decoration: underline;
        }

        /* Alert/Notification */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: rgba(192, 57, 43, 0.1);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        .alert-info {
            background: rgba(78, 0, 0, 0.05);
            color: var(--burgundy);
            border-left: 4px solid var(--burgundy);
        }

        /* Loading State */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .auth-container {
                padding: 40px 30px;
            }

            .logo h1 {
                font-size: 30px;
            }

            .logo-icon {
                font-size: 48px;
            }

            .otp-input {
                width: 48px;
                height: 56px;
                font-size: 22px;
            }

            .tab {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Ashesi Branding -->
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <h1>CampusAid</h1>
            <p>Ashesi University</p>
            <p class="logo-subtext">Student Support Services Platform</p>
        </div>

        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Tab Buttons -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        class="form-control" 
                        placeholder="your.email@ashesi.edu.gh"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        class="form-control" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn-premium" id="loginBtn">
                    Sign In
                </button>

                <p class="helper-text">
                    Forgot your password? <a href="/forgot-password.html">Reset it here</a>
                </p>
            </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input 
                        type="text" 
                        id="signupName" 
                        class="form-control" 
                        placeholder="Isabella Tsikata"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupEmail">Ashesi Email</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-control" 
                        placeholder="isabella.tsikata@ashesi.edu.gh"
                        pattern=".*@ashesi\.edu\.gh$"
                        title="Must be an Ashesi email"
                        required
                    >
                </div>

                <div class="form-group" id="studentIdGroup">
                    <label for="signupStudentId">Student ID</label>
                    <input 
                        type="text" 
                        id="signupStudentId" 
                        class="form-control" 
                        placeholder="STU001"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        class="form-control" 
                        placeholder="Create a strong password"
                        minlength="6"
                        required
                    >
                </div>

                <!-- Staff Checkbox -->
                <div class="checkbox-group">
                    <input 
                        type="checkbox" 
                        id="isStaffCheckbox" 
                        onchange="toggleStaffFields()"
                    >
                    <label for="isStaffCheckbox">I want to join as Staff</label>
                </div>

                <!-- Staff Fields (Hidden by default) -->
                <div id="staffFields" class="service-select-group">
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="serviceSelect">Select Service</label>
                        <select id="serviceSelect" class="form-control">
                            <option value="">Loading services...</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="staffPosition">Position</label>
                        <input 
                            type="text" 
                            id="staffPosition" 
                            class="form-control" 
                            placeholder="e.g., Career Advisor"
                        >
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="staffReason">Reason for Joining (Optional)</label>
                        <input 
                            type="text" 
                            id="staffReason" 
                            class="form-control" 
                            placeholder="Brief description"
                        >
                    </div>
                </div>

                <button type="submit" class="btn-premium" id="signupBtn">
                    Create Account
                </button>

                <p class="helper-text">
                    Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in here</a>
                </p>
            </form>
        </div>

        <!-- OTP Verification Form -->
        <div id="otpForm" class="form-container">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="font-size: 48px; margin-bottom: 16px;">📧</div>
                <h2 style="color: var(--burgundy); font-size: 24px; margin-bottom: 8px;">Verify Your Email</h2>
                <p style="color: var(--slate); font-size: 14px;">
                    Enter the 6-digit code sent to<br>
                    <strong id="otpEmail" style="color: var(--navy);"></strong>
                </p>
            </div>

            <form onsubmit="handleOTPVerification(event)">
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" id="otp1" oninput="moveToNext(this, 'otp2')" onkeydown="handleBackspace(event, null, 'otp1')">
                    <input type="text" class="otp-input" maxlength="1" id="otp2" oninput="moveToNext(this, 'otp3')" onkeydown="handleBackspace(event, 'otp1', 'otp2')">
                    <input type="text" class="otp-input" maxlength="1" id="otp3" oninput="moveToNext(this, 'otp4')" onkeydown="handleBackspace(event, 'otp2', 'otp3')">
                    <input type="text" class="otp-input" maxlength="1" id="otp4" oninput="moveToNext(this, 'otp5')" onkeydown="handleBackspace(event, 'otp3', 'otp4')">
                    <input type="text" class="otp-input" maxlength="1" id="otp5" oninput="moveToNext(this, 'otp6')" onkeydown="handleBackspace(event, 'otp4', 'otp5')">
                    <input type="text" class="otp-input" maxlength="1" id="otp6" oninput="moveToNext(this, null)" onkeydown="handleBackspace(event, 'otp5', 'otp6')">
                </div>

                <button type="submit" class="btn-premium">
                    Verify & Continue
                </button>

                <p class="helper-text">
                    Didn't receive code? <a href="#" onclick="alert('Resending OTP...'); return false;">Resend OTP</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentEmail = '';

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            
            hideAlert();
        }

        // Alert functions
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            document.getElementById('alertMessage').classList.remove('show');
        }

        // Staff fields toggle
        function toggleStaffFields() {
            const staffFields = document.getElementById('staffFields');
            const studentIdGroup = document.getElementById('studentIdGroup');
            const studentIdInput = document.getElementById('signupStudentId');
            const isChecked = document.getElementById('isStaffCheckbox').checked;
            
            if (isChecked) {
                // Show staff fields
                staffFields.classList.add('visible');
                loadServices();
                
                // Hide and make Student ID optional for staff
                studentIdGroup.style.display = 'none';
                studentIdInput.removeAttribute('required');
            } else {
                // Hide staff fields
                staffFields.classList.remove('visible');
                
                // Show and make Student ID required for students
                studentIdGroup.style.display = 'block';
                studentIdInput.setAttribute('required', 'required');
            }
        }

        // Load services
        async function loadServices() {
            try {
                const response = await fetch(`${API_BASE}/services`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                const select = document.getElementById('serviceSelect');
                select.innerHTML = '<option value="">-- Select Service --</option>' +
                    data.data.map(s => `<option value="${s.id}">${s.service_name}</option>`).join('');
            } catch (error) {
                console.error('Error loading services:', error);
            }
        }

        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                
                const data = await response.json();
                console.log('Full login response:', data);
                
                if (data.success) {
                    // Handle different possible response structures
                    let user = null;
                    
                    if (data.data && data.data.user) {
                        user = data.data.user;
                    } else if (data.data) {
                        user = data.data;
                    } else if (data.user) {
                        user = data.user;
                    }
                    
                    console.log('Extracted user:', user);
                    
                    if (!user) {
                        showAlert('Login succeeded but no user data received', 'error');
                        console.error('Could not find user in response:', data);
                        return;
                    }
                    
                    // Store user data
                    sessionStorage.setItem('user', JSON.stringify(user));
                    
                    // Verify storage
                    const stored = sessionStorage.getItem('user');
                    console.log('Stored user data:', stored);
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/services.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }

        // Handle Signup
        async function handleSignup(e) {
            e.preventDefault();
            hideAlert();
            
            const isStaff = document.getElementById('isStaffCheckbox').checked;
            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating account...';
            
            const payload = {
                full_name: document.getElementById('signupName').value,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value
            };
            
            if (isStaff) {
                // For staff, generate a staff ID from email
                const emailPrefix = document.getElementById('signupEmail').value.split('@')[0];
                payload.student_id = 'STAFF-' + emailPrefix.toUpperCase();
                payload.is_staff = true;
                payload.service_id = document.getElementById('serviceSelect').value;
                payload.position = document.getElementById('staffPosition').value;
                payload.reason = document.getElementById('staffReason').value;
            } else {
                // For students, use the provided student ID
                payload.student_id = document.getElementById('signupStudentId').value;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentEmail = payload.email;
                    document.getElementById('otpEmail').textContent = currentEmail;
                    document.getElementById('signupForm').classList.remove('active');
                    document.getElementById('otpForm').classList.add('active');
                    showAlert('OTP sent to your email!', 'success');
                    document.getElementById('otp1').focus();
                } else {
                    showAlert(data.error || 'Signup failed', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }

        // OTP Navigation
        function moveToNext(current, nextId) {
            if (current.value.length === 1 && nextId) {
                document.getElementById(nextId).focus();
            }
        }

        function handleBackspace(e, prevId, currentId) {
            if (e.key === 'Backspace' && !document.getElementById(currentId).value && prevId) {
                document.getElementById(prevId).focus();
            }
        }

        // Handle OTP Verification
        async function handleOTPVerification(e) {
            e.preventDefault();
            hideAlert();
            
            const otp = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6']
                .map(id => document.getElementById(id).value)
                .join('');
            
            if (otp.length !== 6) {
                showAlert('Please enter all 6 digits', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                
                const data = await response.json();
                console.log('OTP verification response:', data);
                
                if (data.success) {
                    // Handle different possible response structures
                    let user = null;
                    
                    if (data.data && data.data.user) {
                        user = data.data.user;
                    } else if (data.data) {
                        user = data.data;
                    } else if (data.user) {
                        user = data.user;
                    }
                    
                    console.log('Extracted user from OTP:', user);
                    
                    if (!user) {
                        showAlert('Verification succeeded but no user data received', 'error');
                        console.error('Could not find user in OTP response:', data);
                        return;
                    }
                    
                    sessionStorage.setItem('user', JSON.stringify(user));
                    showAlert('Verification successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/services.html', 1000);
                } else {
                    showAlert(data.error || 'Invalid OTP', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
