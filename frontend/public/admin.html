<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusAid - Service Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 35px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card h2 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .upload-zone {
            border: 3px dashed #bdc3c7;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            background: #f8f9fa;
        }

        .upload-zone:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .upload-zone.dragover {
            border-color: #667eea;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 15px;
            color: #95a5a6;
        }

        .upload-text {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-subtext {
            font-size: 14px;
            color: #7f8c8d;
        }

        .file-input {
            display: none;
        }

        .documents-list {
            margin-top: 25px;
        }

        .document-item {
            background: #f8f9fa;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .document-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .document-meta {
            font-size: 13px;
            color: #7f8c8d;
            display: flex;
            gap: 20px;
        }

        .document-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        .icon-btn.embeddings {
            background: #3498db;
            color: white;
        }

        .icon-btn.delete {
            background: #e74c3c;
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.success {
            background: #d4edda;
            color: #155724;
        }

        .badge.warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #95a5a6;
        }

        .empty-state h3 {
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            max-width: 400px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.show {
            display: block;
        }

        .notification.success {
            border-left: 5px solid #27ae60;
        }

        .notification.error {
            border-left: 5px solid #e74c3c;
        }

        .notification.info {
            border-left: 5px solid #3498db;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ================================================
           PREMIUM THEME - Burgundy & Cream
           ================================================ */
        :root {
            --burgundy-primary: #4E0000;
            --burgundy-dark: #3A0000;
            --burgundy-light: #6B1E1E;
            --cream: #F5E6D3;
            --cream-dark: #E6C9A8;
            --chocolate: #6B4E3D;
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
        }

        .header {
            background: white;
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.1);
            border-bottom: 3px solid var(--burgundy-primary);
        }

        .header h1 {
            color: var(--burgundy-primary);
        }

        .back-btn {
            background: var(--cream);
            color: var(--burgundy-primary);
            border: 2px solid var(--burgundy-primary);
        }

        .back-btn:hover {
            background: var(--cream-dark);
            transform: translateY(-2px);
        }

        .tabs {
            background: white;
            box-shadow: 0 4px 20px rgba(78, 0, 0, 0.1);
        }

        .tab {
            color: var(--chocolate);
        }

        .tab.active {
            background: var(--burgundy-primary);
            color: var(--cream);
        }

        .tab:hover:not(.active) {
            background: var(--cream);
            color: var(--burgundy-primary);
        }

        .dashboard-grid .card {
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.08);
            border: 1px solid rgba(78, 0, 0, 0.08);
        }

        .stat-card {
            border-left: 4px solid var(--burgundy-primary);
        }

        .stat-card h3 {
            color: var(--burgundy-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--burgundy-primary) 0%, var(--burgundy-light) 100%);
            box-shadow: 0 4px 15px rgba(78, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--burgundy-dark) 0%, var(--burgundy-primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 0, 0, 0.3);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--burgundy-primary);
            border: 2px solid var(--burgundy-primary);
        }

        .btn-secondary:hover {
            background: var(--cream-dark);
        }

        .btn-danger {
            background: var(--burgundy-primary);
        }

        .btn-danger:hover {
            background: var(--burgundy-dark);
        }

        .form-group label {
            color: var(--burgundy-primary);
        }

        .form-control {
            border: 2px solid var(--cream-dark);
        }

        .form-control:focus {
            border-color: var(--burgundy-primary);
            box-shadow: 0 0 0 4px rgba(78, 0, 0, 0.1);
        }

        .badge {
            background: var(--burgundy-primary);
        }

        .badge.status-active {
            background: #28a745;
        }

        .badge.status-inactive {
            background: var(--chocolate);
        }

        .modal-content {
            border: 2px solid var(--burgundy-primary);
        }

        .modal-header {
            background: var(--burgundy-primary);
            color: var(--cream);
        }

        .close {
            color: var(--cream);
        }

        .alert-success {
            background: #D4EDDA;
            border-color: #C3E6CB;
        }

        .alert-error {
            background: #F8D7DA;
            border-color: var(--burgundy-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>📚</span>
                Service Admin Dashboard
            </h1>
            <div class="header-actions">
                <div class="user-badge" id="serviceName">Loading...</div>
                <a href="/services.html" class="btn btn-secondary">← Back to Services</a>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Left: Stats & Upload -->
            <div>
                <!-- Stats Card -->
                <div class="card">
                    <h2>📊 Statistics</h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-number" id="totalDocs">0</div>
                            <div class="stat-label">Documents</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="totalEmbeddings">0</div>
                            <div class="stat-label">Embeddings</div>
                        </div>
                    </div>
                </div>

                <!-- Upload Card -->
                <div class="card" style="margin-top: 25px;">
                    <h2>📤 Upload Document</h2>
                    
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Drop files here or click to browse</div>
                        <div class="upload-subtext">PDF, DOCX, XLSX, TXT • Max 10MB</div>
                    </div>

                    <input type="file" id="fileInput" class="file-input" accept=".pdf,.docx,.xlsx,.xls,.txt" multiple>

                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>

                    <button class="btn btn-primary" style="width: 100%;" id="uploadBtn">
                        <span>⬆️</span> Upload & Generate Embeddings
                    </button>
                </div>
            </div>

            <!-- Right: Documents List -->
            <div class="card">
                <h2>📁 Uploaded Documents</h2>
                
                <div id="documentsList" class="documents-list">
                    <div class="loading">Loading documents</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        const API_BASE = 'window.location.origin/api';
        let currentService = null;
        let selectedFiles = [];

        // Check authentication
        function checkAuth() {
            const user = sessionStorage.getItem('user');
            if (!user) {
                window.location.href = '/';
                return null;
            }
            return JSON.parse(user);
        }

        // Get service from URL
        function getServiceId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('service');
        }

        // Load service info
        async function loadServiceInfo() {
            try {
                const serviceId = getServiceId();
                if (!serviceId) {
                    alert('No service specified');
                    window.location.href = '/services.html';
                    return;
                }

                const response = await fetch(`${API_BASE}/services/${serviceId}`, {
                    credentials: 'include'
                });

                const data = await response.json();
                currentService = data.data;

                document.getElementById('serviceName').textContent = currentService.service_name;
                
                loadDocuments();
                loadStats();

            } catch (error) {
                console.error('Error loading service:', error);
                showNotification('Failed to load service information', 'error');
            }
        }

        // Load documents
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}/files/service/${currentService.id}`, {
                    credentials: 'include'
                });

                const data = await response.json();
                const documents = data.data || [];

                const docsList = document.getElementById('documentsList');

                if (documents.length === 0) {
                    docsList.innerHTML = `
                        <div class="empty-state">
                            <h3>No documents yet</h3>
                            <p>Upload documents to train your service bot</p>
                        </div>
                    `;
                    return;
                }

                docsList.innerHTML = documents.map(doc => `
                    <div class="document-item">
                        <div class="document-info">
                            <div class="document-name">
                                📄 ${doc.original_name}
                                ${doc.text_length > 0 ? '<span class="badge success">✓ Indexed</span>' : '<span class="badge warning">⚠ Not Indexed</span>'}
                            </div>
                            <div class="document-meta">
                                <span>📏 ${formatFileSize(doc.file_size)}</span>
                                <span>📅 ${formatDate(doc.created_at)}</span>
                                <span>👤 ${doc.uploader_name}</span>
                            </div>
                        </div>
                        <div class="document-actions">
                            <button class="icon-btn embeddings" onclick="generateEmbeddings(${doc.id})" title="Generate Embeddings">
                                🧠
                            </button>
                            <button class="icon-btn delete" onclick="deleteDocument(${doc.id})" title="Delete">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading documents:', error);
                document.getElementById('documentsList').innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading documents</h3>
                    </div>
                `;
            }
        }

        // Load stats
        async function loadStats() {
            // For now, just count documents
            // TODO: Add API endpoint for stats
            const response = await fetch(`${API_BASE}/files/service/${currentService.id}`, {
                credentials: 'include'
            });
            const data = await response.json();
            const docs = data.data || [];
            
            document.getElementById('totalDocs').textContent = docs.length;
            document.getElementById('totalEmbeddings').textContent = '...'; // Will update with real data
        }

        // Upload zone drag & drop
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
        });

        function handleFiles(files) {
            selectedFiles = files.filter(file => {
                const validTypes = ['.pdf', '.docx', '.xlsx', '.xls', '.txt'];
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                return validTypes.includes(ext) && file.size <= 10 * 1024 * 1024;
            });

            if (selectedFiles.length > 0) {
                uploadZone.querySelector('.upload-text').textContent = 
                    `${selectedFiles.length} file(s) selected - Ready to upload!`;
                uploadZone.style.borderColor = '#27ae60';
                uploadZone.style.background = '#d4edda';
            } else {
                uploadZone.querySelector('.upload-text').textContent = 
                    'Invalid files or files too large (max 10MB)';
                uploadZone.style.borderColor = '#e74c3c';
                uploadZone.style.background = '#f8d7da';
            }
        }

        // Upload files
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                showNotification('Please select files to upload', 'error');
                return;
            }

            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            progressBar.style.display = 'block';

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                
                try {
                    // Upload file
                    const formData = new FormData();
                    formData.append('files', file);
                    formData.append('service_id', currentService.id);

                    const uploadResponse = await fetch(`${API_BASE}/files/upload`, {
                        method: 'POST',
                        credentials: 'include',
                        body: formData
                    });

                    const uploadData = await uploadResponse.json();

                    if (uploadData.success) {
                        const fileId = uploadData.data.id;
                        
                        // Auto-generate embeddings
                        showNotification(`Generating embeddings for ${file.name}...`, 'info');
                        
                        const embeddingsResponse = await fetch(`${API_BASE}/files/${fileId}/embeddings`, {
                            method: 'POST',
                            credentials: 'include'
                        });

                        if (embeddingsResponse.ok) {
                            showNotification(`✓ ${file.name} uploaded and indexed!`, 'success');
                        }
                    }

                    // Update progress
                    const progress = ((i + 1) / selectedFiles.length) * 100;
                    progressFill.style.width = progress + '%';

                } catch (error) {
                    console.error('Upload error:', error);
                    showNotification(`Failed to upload ${file.name}`, 'error');
                }
            }

            // Reset
            selectedFiles = [];
            fileInput.value = '';
            uploadZone.querySelector('.upload-text').textContent = 'Drop files here or click to browse';
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';

            // Reload documents
            loadDocuments();
            loadStats();
        });

        // Generate embeddings for existing document
        async function generateEmbeddings(fileId) {
            showNotification('Generating embeddings...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/files/${fileId}/embeddings`, {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(`✓ Generated ${data.data.embeddings_generated} embeddings!`, 'success');
                    loadDocuments();
                    loadStats();
                } else {
                    showNotification('Failed to generate embeddings', 'error');
                }

            } catch (error) {
                console.error('Error:', error);
                showNotification('Error generating embeddings', 'error');
            }
        }

        // Delete document
        async function deleteDocument(fileId) {
            if (!confirm('Are you sure you want to delete this document? This will also remove its embeddings.')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/files/${fileId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('Document deleted successfully', 'success');
                    loadDocuments();
                    loadStats();
                } else {
                    showNotification('Failed to delete document', 'error');
                }

            } catch (error) {
                console.error('Error:', error);
                showNotification('Error deleting document', 'error');
            }
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;

            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const user = checkAuth();
            if (!user) return;

            loadServiceInfo();
        });
    </script>
</body>
</html>
