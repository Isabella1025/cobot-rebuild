<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard - CampusAid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 35px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabs {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            display: flex;
            gap: 15px;
        }

        .tab {
            padding: 12px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #7f8c8d;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .appointments-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .appointment-item {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .appointment-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .appointment-item.pending {
            border-left-color: #f39c12;
        }

        .appointment-item.approved {
            border-left-color: #27ae60;
        }

        .appointment-item.declined {
            border-left-color: #e74c3c;
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .appointment-student {
            flex: 1;
        }

        .student-name {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .student-email {
            font-size: 13px;
            color: #7f8c8d;
        }

        .appointment-badge {
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .appointment-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .appointment-badge.approved {
            background: #d4edda;
            color: #155724;
        }

        .appointment-badge.declined {
            background: #f8d7da;
            color: #721c24;
        }

        .appointment-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .detail-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-value {
            font-size: 16px;
            color: #2c3e50;
            font-weight: 500;
        }

        .appointment-reason {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .appointment-reason strong {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .appointment-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-approve {
            background: #27ae60;
            color: white;
        }

        .btn-approve:hover {
            background: #229954;
        }

        .btn-decline {
            background: #e74c3c;
            color: white;
        }

        .btn-decline:hover {
            background: #c0392b;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #7f8c8d;
        }

        .empty-state h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #2c3e50;
            font-size: 22px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #95a5a6;
        }

        .close-btn:hover {
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 2000;
            max-width: 400px;
        }

        .notification.show {
            display: block;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 5px solid #27ae60;
        }

        .notification.error {
            border-left: 5px solid #e74c3c;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        /* ========================================
           MOBILE RESPONSIVENESS
           ======================================== */
        
        /* Tablet (768px and below) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .dashboard-container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .back-btn {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .tab-buttons {
                flex-wrap: wrap;
                gap: 8px;
            }

            .tab-btn {
                flex: 1;
                min-width: calc(50% - 4px);
            }

            .appointments-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
                padding: 25px 20px;
            }
        }

        /* Mobile (480px and below) */
        @media (max-width: 480px) {
            .dashboard-container {
                padding: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                min-width: 100%;
                font-size: 13px;
            }

            .appointment-card h3 {
                font-size: 16px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        /* ================================================
           PREMIUM THEME - Burgundy & Cream
           ================================================ */
        :root {
            --burgundy-primary: #4E0000;
            --burgundy-dark: #3A0000;
            --burgundy-light: #6B1E1E;
            --cream: #F5E6D3;
            --cream-dark: #E6C9A8;
            --chocolate: #6B4E3D;
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
        }

        .header {
            background: white;
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.1);
            border-bottom: 3px solid var(--burgundy-primary);
        }

        .header h1 {
            color: var(--burgundy-primary);
        }

        .user-badge {
            background: linear-gradient(135deg, var(--burgundy-primary) 0%, var(--burgundy-light) 100%);
            color: var(--cream);
        }

        .back-btn {
            background: var(--cream);
            color: var(--burgundy-primary);
            border: 2px solid var(--burgundy-primary);
        }

        .back-btn:hover {
            background: var(--cream-dark);
            transform: translateY(-2px);
        }

        .stats-card {
            box-shadow: 0 10px 40px rgba(78, 0, 0, 0.08);
            border-left: 4px solid var(--burgundy-primary);
        }

        .stats-card h3 {
            color: var(--burgundy-primary);
        }

        .card {
            box-shadow: 0 8px 30px rgba(78, 0, 0, 0.08);
            border: 1px solid rgba(78, 0, 0, 0.08);
        }

        .card h2 {
            color: var(--burgundy-primary);
        }

        .status-badge.pending {
            background: var(--cream-dark);
            color: var(--chocolate);
        }

        .status-badge.approved {
            background: #28a745;
        }

        .status-badge.completed {
            background: #17a2b8;
        }

        .status-badge.declined {
            background: var(--burgundy-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--burgundy-primary) 0%, var(--burgundy-light) 100%);
            box-shadow: 0 4px 15px rgba(78, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--burgundy-dark) 0%, var(--burgundy-primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 0, 0, 0.3);
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: var(--burgundy-primary);
        }

        .btn-danger:hover {
            background: var(--burgundy-dark);
        }

        .alert-success {
            background: #D4EDDA;
            border-color: #C3E6CB;
        }

        .alert-error {
            background: #F8D7DA;
            border-color: var(--burgundy-light);
        }

        .modal-content {
            border: 2px solid var(--burgundy-primary);
        }

        .modal-header {
            background: var(--burgundy-primary);
            color: var(--cream);
        }

        .form-group label {
            color: var(--burgundy-primary);
        }

        .form-control {
            border: 2px solid var(--cream-dark);
        }

        .form-control:focus {
            border-color: var(--burgundy-primary);
            box-shadow: 0 0 0 4px rgba(78, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>👨‍💼 Staff Dashboard</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="user-badge" id="staffName">Loading...</div>
                <a href="/services.html" class="btn btn-secondary">← Back</a>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-status="pending">Pending Requests</button>
            <button class="tab" data-status="approved">Approved</button>
            <button class="tab" data-status="declined">Declined</button>
            <button class="tab" data-status="">All Appointments</button>
        </div>

        <!-- Appointments -->
        <div class="appointments-container">
            <div id="loadingState" class="loading">Loading appointments...</div>
            <div id="appointmentsList" style="display: none;"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <h3>No appointments</h3>
                <p>You have no appointments in this category</p>
            </div>
        </div>
    </div>

    <!-- Action Modal -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Update Appointment</h2>
                <button class="close-btn" id="closeModalBtn">×</button>
            </div>
            <form id="actionForm">
                <div class="form-group">
                    <label for="staffNotes">Notes (Optional)</label>
                    <textarea id="staffNotes" placeholder="Add any notes or comments for the student..."></textarea>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="submit" class="btn" id="submitActionBtn" style="flex: 1;">
                        Confirm
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelActionBtn">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentUser = null;
        let currentFilter = 'pending';
        let currentAppointmentId = null;
        let currentAction = null;

        // Check auth
        function checkAuth() {
            const user = sessionStorage.getItem('user');
            if (!user) {
                window.location.href = '/';
                return null;
            }
            const userData = JSON.parse(user);
            
            // Check if user is staff or admin
            if (!['staff', 'lecturer', 'admin', 'service_admin'].includes(userData.role)) {
                alert('Access denied. Staff privileges required.');
                window.location.href = '/services.html';
                return null;
            }
            
            return userData;
        }

        // Load appointments
        async function loadAppointments(status = null) {
            try {
                document.getElementById('loadingState').style.display = 'block';
                document.getElementById('appointmentsList').style.display = 'none';
                document.getElementById('emptyState').style.display = 'none';

                const url = status 
                    ? `${API_BASE}/appointments/my-assigned?status=${status}`
                    : `${API_BASE}/appointments/my-assigned`;

                const response = await fetch(url, {
                    credentials: 'include'
                });

                const data = await response.json();
                const appointments = data.data || [];

                document.getElementById('loadingState').style.display = 'none';

                if (appointments.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                const list = document.getElementById('appointmentsList');
                list.style.display = 'block';
                list.innerHTML = '';

                appointments.forEach(apt => {
                    list.appendChild(createAppointmentItem(apt));
                });

            } catch (error) {
                console.error('Error loading appointments:', error);
                showNotification('Failed to load appointments', 'error');
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/appointments/my-assigned`, {
                    credentials: 'include'
                });

                const data = await response.json();
                const appointments = data.data || [];

                const pending = appointments.filter(a => a.status === 'pending').length;
                const approved = appointments.filter(a => a.status === 'approved').length;

                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('approvedCount').textContent = approved;
                document.getElementById('totalCount').textContent = appointments.length;

            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Create appointment item
        function createAppointmentItem(apt) {
            const item = document.createElement('div');
            item.className = `appointment-item ${apt.status}`;

            const date = new Date(apt.appointment_date);
            const dateStr = date.toLocaleDateString('en-US', { 
                weekday: 'long',
                month: 'long', 
                day: 'numeric', 
                year: 'numeric' 
            });

            const isPending = apt.status === 'pending';

            item.innerHTML = `
                <div class="appointment-header">
                    <div class="appointment-student">
                        <div class="student-name">${apt.student_name}</div>
                        <div class="student-email">${apt.student_email}</div>
                    </div>
                    <span class="appointment-badge ${apt.status}">${apt.status}</span>
                </div>

                <div class="appointment-details">
                    <div class="detail-item">
                        <div class="detail-label">Service</div>
                        <div class="detail-value">${apt.service_name}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Date</div>
                        <div class="detail-value">${dateStr}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Time</div>
                        <div class="detail-value">${formatTime(apt.appointment_time)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Duration</div>
                        <div class="detail-value">${apt.duration_minutes} min</div>
                    </div>
                </div>

                <div class="appointment-reason">
                    <strong>Reason:</strong>
                    ${escapeHtml(apt.reason || 'No reason provided')}
                </div>

                ${apt.staff_notes ? `
                    <div class="appointment-reason" style="background: #f0f3ff;">
                        <strong>Your Notes:</strong>
                        ${escapeHtml(apt.staff_notes)}
                    </div>
                ` : ''}

                ${isPending ? `
                    <div class="appointment-actions">
                        <button class="btn btn-approve btn-small" onclick="openActionModal(${apt.id}, 'approved')">
                            ✓ Approve
                        </button>
                        <button class="btn btn-decline btn-small" onclick="openActionModal(${apt.id}, 'declined')">
                            ✗ Decline
                        </button>
                    </div>
                ` : ''}
            `;

            return item;
        }

        // Format time
        function formatTime(timeStr) {
            const [hours, minutes] = timeStr.split(':');
            const h = parseInt(hours);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const displayHour = h % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Open action modal
        function openActionModal(appointmentId, action) {
            currentAppointmentId = appointmentId;
            currentAction = action;

            const modal = document.getElementById('actionModal');
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitActionBtn');

            if (action === 'approved') {
                title.textContent = 'Approve Appointment';
                submitBtn.textContent = '✓ Approve';
                submitBtn.className = 'btn btn-approve';
            } else {
                title.textContent = 'Decline Appointment';
                submitBtn.textContent = '✗ Decline';
                submitBtn.className = 'btn btn-decline';
            }

            document.getElementById('staffNotes').value = '';
            modal.classList.add('show');
        }

        // Close modal
        function closeModal() {
            document.getElementById('actionModal').classList.remove('show');
            currentAppointmentId = null;
            currentAction = null;
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelActionBtn').addEventListener('click', closeModal);

        // Submit action
        document.getElementById('actionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentAppointmentId || !currentAction) return;

            const notes = document.getElementById('staffNotes').value;

            try {
                const response = await fetch(`${API_BASE}/appointments/${currentAppointmentId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        status: currentAction,
                        notes: notes || null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(`Appointment ${currentAction} successfully!`, 'success');
                    closeModal();
                    loadAppointments(currentFilter === '' ? null : currentFilter);
                    loadStats();
                } else {
                    showNotification(data.error || 'Failed to update appointment', 'error');
                }

            } catch (error) {
                console.error('Error updating appointment:', error);
                showNotification('Failed to update appointment', 'error');
            }
        });

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const status = tab.dataset.status;
                currentFilter = status;
                loadAppointments(status === '' ? null : status);
            });
        });

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;

            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            currentUser = checkAuth();
            if (!currentUser) return;

            document.getElementById('staffName').textContent = 
                currentUser.full_name || currentUser.email;

            loadAppointments('pending');
            loadStats();
        });
    </script>
</body>
</html>
